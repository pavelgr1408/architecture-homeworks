name: Publish Architecture Homeworks

on:
  push:
    branches:
      - master
      - main
    paths:
      - "homeworks/**"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/pages.yml"

  pull_request:
    branches:
      - master
      - main
    paths:
      - "homeworks/**"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make scripts executable
        run: |
          chmod +x scripts/render_diagrams.sh
          chmod +x scripts/build_site.py

      - name: Render PlantUML and Structurizr
        run: |
          scripts/render_diagrams.sh

      - name: Generate MkDocs source tree
        run: |
          python scripts/build_site.py

      - name: Build MkDocs site
        run: |
          mkdocs build --strict --site-dir site

      - name: Verify generated site
        run: |
          test -f site/index.html
          test -f site/homeworks/index.html

          echo "Generated site files:"
          find site -maxdepth 6 -type f -print

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
