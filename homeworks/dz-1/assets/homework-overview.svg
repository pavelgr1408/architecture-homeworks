<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Обзор домашнего задания</title>
  <desc id="desc">Клиент обращается к API Gateway, затем к Order Service и PostgreSQL, а событие отправляется в Kafka.</desc>
  <rect width="1200" height="420" fill="#f7f9fc"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="50" y="140" width="190" height="100" rx="16" fill="#ffffff" stroke="#455a64" stroke-width="3"/>
    <text x="145" y="185" font-size="25" fill="#263238">Клиент</text>
    <text x="145" y="215" font-size="16" fill="#546e7a">Web / Mobile</text>

    <rect x="320" y="140" width="200" height="100" rx="16" fill="#ffffff" stroke="#1565c0" stroke-width="3"/>
    <text x="420" y="185" font-size="25" fill="#0d47a1">API Gateway</text>
    <text x="420" y="215" font-size="16" fill="#546e7a">REST</text>

    <rect x="600" y="140" width="210" height="100" rx="16" fill="#ffffff" stroke="#2e7d32" stroke-width="3"/>
    <text x="705" y="185" font-size="25" fill="#1b5e20">Order Service</text>
    <text x="705" y="215" font-size="16" fill="#546e7a">Java / Spring Boot</text>

    <rect x="920" y="50" width="210" height="100" rx="16" fill="#ffffff" stroke="#6a1b9a" stroke-width="3"/>
    <text x="1025" y="95" font-size="25" fill="#4a148c">PostgreSQL</text>
    <text x="1025" y="125" font-size="16" fill="#546e7a">Orders</text>

    <rect x="920" y="270" width="210" height="100" rx="16" fill="#ffffff" stroke="#ef6c00" stroke-width="3"/>
    <text x="1025" y="315" font-size="25" fill="#e65100">Kafka</text>
    <text x="1025" y="345" font-size="16" fill="#546e7a">OrderCreated</text>

    <g stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M240 190 H320"/>
      <path d="M520 190 H600"/>
      <path d="M810 170 C860 160 870 110 920 100"/>
      <path d="M810 215 C860 235 870 300 920 320"/>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#607d8b"/>
    </marker>
  </defs>
</svg>
